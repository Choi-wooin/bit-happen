<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon-admin.svg" />
    <title>BIT HAPPENS | Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Manrope:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/login.css" />
  </head>
  <body>
    <main class="login-wrap">
      <section class="login-panel">
        <p class="eyebrow">BIT HAPPENS ADMIN</p>
        <h1>관리자 로그인</h1>
        <p class="sub">카드 관리자와 미디어 관리자는 로그인 후 사용할 수 있습니다.</p>
        <form id="login-form">
          <label>아이디
            <input id="login-id" autocomplete="username" required />
          </label>
          <label>비밀번호
            <input id="login-password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">로그인</button>
        </form>
        <p id="login-message" class="message"></p>
      </section>
    </main>

    <script src="../assets/js/app-version.js"></script>
    <script src="../assets/js/asset-loader.js"></script>
    <script>
      window.BitHappenLoadScripts(['../assets/js/supabase-config.js', '../assets/js/admin-auth.js', '../assets/js/login.js']);
    </script>
  </body>
</html>
